services:
  # ─── Express Backend ─────────────────────────────────────────────────────────
  - type: web
    name: bluelearnerhub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://bluelearnerhub-frontend-bluecoderhubs-projects.vercel.app
      - key: CORS_ORIGINS
        value: https://bluelearnerhub-frontend-bluecoderhubs-projects.vercel.app,http://localhost:3000
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        value: REDACTED_ROTATE_THIS_KEY
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bluelearnerhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bluelearnerhub-redis
          property: connectionString

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: bluelearnerhub-db
    databaseName: edtech_platform
    user: edtech_user
    plan: free

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - name: bluelearnerhub-redis
    type: redis
    plan: free
    maxmemoryPolicy: allkeys-lru

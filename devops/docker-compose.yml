version: '3.8'

# =============================================================================
# DEVELOPMENT ONLY - DO NOT USE IN PRODUCTION
# These default values are for local development convenience only.
# Override all secrets via environment variables in production deployments.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: edtech_db
    environment:
      POSTGRES_DB: edtech_platform
      POSTGRES_USER: postgres
      # ⚠️ DEVELOPMENT DEFAULT - Override via POSTGRES_PASSWORD env var
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edtech-network

  redis:
    image: redis:7-alpine
    container_name: edtech_redis
    # ⚠️ DEVELOPMENT DEFAULT - Override via REDIS_PASSWORD env var
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edtech-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: edtech_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - HOST=0.0.0.0
      
      # Database Configuration
      # ⚠️ DEVELOPMENT DEFAULT - Override via POSTGRES_PASSWORD env var
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/edtech_platform
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=edtech_platform
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      - DB_MAX_CONNECTIONS=20
      - DB_IDLE_TIMEOUT=30000
      - DB_CONNECTION_TIMEOUT=2000
      
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # ⚠️ DEVELOPMENT DEFAULT - Override via REDIS_PASSWORD env var
      - REDIS_PASSWORD=${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      - REDIS_DB=0
      
      # Security — DEVELOPMENT DEFAULTS ONLY (override in production via .env)
      # ⚠️ NEVER use these default values in production! ⚠️
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
      - SESSION_SECRET=${SESSION_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - COOKIE_SECRET=${COOKIE_SECRET:-CHANGE_ME_IN_PRODUCTION}
      
      # External Services
      - AI_SERVICE_URL=http://ai-services:8000
      - FRONTEND_URL=http://frontend:3000
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      
      # Optional Services
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - JUDGE0_API_URL=${JUDGE0_API_URL:-https://judge0-ce.p.rapidapi.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
      - ../backend/uploads:/app/uploads
    networks:
      - edtech-network
    restart: unless-stopped

  ai-services:
    build:
      context: ../worker/ai-services
      dockerfile: Dockerfile
    container_name: edtech_ai_services
    environment:
      # Database Configuration - CHANGE THESE IN PRODUCTION
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/edtech_platform
      
      # Redis Configuration - CHANGE THESE IN PRODUCTION  
      - REDIS_URL=redis://:${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@redis:6379/1
      
      # AI API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Service Configuration
      - PYTHON_ENV=${NODE_ENV:-development}
      - DEBUG=${DEBUG:-True}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOST=0.0.0.0
      - PORT=8000
      
      # Model Configuration
      - MODEL_CACHE_DIR=/app/data/models
      - ENABLE_MODEL_DOWNLOAD=${ENABLE_MODEL_DOWNLOAD:-true}
      
    ports:
      - "8000:8000"
    volumes:
      - ../worker/ai-services:/app
      - ai_models:/app/data/models
      - ../worker/ai-services/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edtech-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - BUILD_STANDALONE=true
    container_name: edtech_frontend
    environment:
      # API Configuration
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
      - NEXT_PUBLIC_AI_SERVICE_URL=http://localhost:8000
      
      # Application Configuration
      - NEXT_PUBLIC_APP_NAME=BluelearnerHub
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      
      # Authentication
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
      
      # OAuth (Optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      
      # Feature Flags
      - NEXT_PUBLIC_ENABLE_AI_COMPANION=${ENABLE_AI_COMPANION:-true}
      - NEXT_PUBLIC_ENABLE_ANALYTICS=${ENABLE_ANALYTICS:-false}
      
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - edtech-network
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: edtech_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - ai-services
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - edtech-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local

networks:
  edtech-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}
